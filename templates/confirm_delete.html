{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>Confirm Deletion</h2>
    </div>
    <div class="card-body">
        <div class="alert alert-warning">
            <strong>⚠️ Warning:</strong> Are you sure you want to delete this {{ type }}?
        </div>
        
        <p><strong>{{ object }}</strong></p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="background-color: #D9534F;">Delete</button>
                <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
