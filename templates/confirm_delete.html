{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}
{% block page_title %}Confirm Delete{% endblock %}

{% block content %}
<div class="table-card scroll-reveal" style="max-width: 480px; margin: 0 auto;">
    <div style="padding: 2rem; text-align: center;">

        <div style="width: 64px; height: 64px; background: rgba(239,68,68,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem;">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
        </div>

        <h2 style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem;">
            Delete {{ type }}
        </h2>
        <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1rem;">
            Are you sure you want to delete this {{ type }}? This action cannot be undone.
        </p>

        <div style="background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 0.875rem 1.25rem; margin-bottom: 1.75rem; text-align: left;">
            <strong style="color: var(--text-primary); font-size: 0.875rem;">{{ object }}</strong>
        </div>

        <form method="post" style="display: flex; gap: 1rem; justify-content: center;">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary" style="background: var(--error); box-shadow: none;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Yes, Delete
            </button>
            <a href="{{ request.META.HTTP_REFERER|default:'/' }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
